<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>漢字クイズ！✏️</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow-x: hidden; }
    body {
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 18px;
      background: linear-gradient(160deg, #fff9e6 0%, #ffecd2 100%);
      min-height: 100vh;
      -webkit-tap-highlight-color: transparent;
    }

    .screen { display: none; min-height: 100vh; flex-direction: column; align-items: center; padding: 24px 16px 48px; }
    .screen.active { display: flex; }

    h1 { font-size: 2.6rem; font-weight: 900; color: #ff6b35; text-shadow: 2px 2px 0 #ffcba0; text-align: center; line-height: 1.2; }
    h2 { font-size: 1.7rem; font-weight: 700; color: #333; margin-bottom: 16px; text-align: center; }

    .card {
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 4px 20px rgba(0,0,0,.1);
      padding: 20px;
      width: 100%;
      max-width: 480px;
    }

    /* ===== ボタン ===== */
    .btn {
      display: block;
      width: 100%;
      max-width: 320px;
      padding: 16px 24px;
      border: none;
      border-radius: 50px;
      font-family: inherit;
      font-size: 1.2rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform .15s, box-shadow .15s;
      text-align: center;
    }
    .btn:active { transform: scale(.96); }
    .btn-primary  { background: #ff6b35; color: #fff; box-shadow: 0 4px 0 #c94a1a; }
    .btn-primary:active  { box-shadow: 0 1px 0 #c94a1a; transform: translateY(3px); }
    .btn-secondary{ background: #4ecdc4; color: #fff; box-shadow: 0 4px 0 #2da69e; }
    .btn-secondary:active{ box-shadow: 0 1px 0 #2da69e; transform: translateY(3px); }
    .btn-ghost    { background: #f0f0f0; color: #555; box-shadow: 0 4px 0 #c8c8c8; }
    .btn-ghost:active    { box-shadow: 0 1px 0 #c8c8c8; transform: translateY(3px); }
    .btn-answer   { background: #fff3cd; color: #856404; box-shadow: 0 4px 0 #c9a227; border: 2px solid #ffc107; }
    .btn-answer:active   { box-shadow: 0 1px 0 #c9a227; transform: translateY(3px); }

    /* ===== スタート画面 ===== */
    #s-start { justify-content: center; gap: 24px; }
    .title-emoji { font-size: 5rem; animation: bounce 1.5s infinite; display: block; text-align: center; }
    @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }
    .subtitle { font-size: 1.1rem; color: #888; text-align: center; }

    .resume-card {
      background: #fff;
      border: 3px solid #4ecdc4;
      border-radius: 20px;
      padding: 16px 20px;
      width: 100%;
      max-width: 320px;
      text-align: center;
    }
    .resume-label { font-size: .9rem; color: #2da69e; font-weight: 700; margin-bottom: 8px; }
    .resume-info  { font-size: 1rem; color: #333; margin-bottom: 12px; }

    /* ===== セットアップ ===== */
    #s-setup { gap: 20px; }
    .series-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
      gap: 12px;
    }
    .series-btn {
      padding: 14px 8px;
      border: 3px solid #ddd;
      border-radius: 16px;
      background: #fff;
      cursor: pointer;
      transition: border-color .15s, background .15s;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 700;
      text-align: center;
    }
    .series-btn .series-emoji { font-size: 2.4rem; display: block; margin-bottom: 4px; }
    .series-btn.selected { border-color: #ff6b35; background: #fff5f0; }

    .drill-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(70px, 1fr));
      gap: 10px;
    }
    .drill-btn {
      padding: 14px 4px;
      border: 3px solid #ddd;
      border-radius: 12px;
      background: #fff;
      cursor: pointer;
      font-family: inherit;
      font-size: 1.2rem;
      font-weight: 700;
      transition: border-color .15s, background .15s;
      text-align: center;
    }
    .drill-btn.selected { border-color: #4ecdc4; background: #f0fffe; color: #2da69e; }

    .section-label {
      font-size: .9rem;
      font-weight: 700;
      color: #888;
      letter-spacing: .05em;
      margin-bottom: 10px;
    }

    /* ===== ローディング ===== */
    #s-loading { justify-content: center; gap: 20px; }
    .spinner {
      width: 64px; height: 64px;
      border: 6px solid #ffd;
      border-top-color: #ff6b35;
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ===== クイズ ===== */
    #s-quiz { gap: 14px; }

    .quiz-header {
      width: 100%;
      max-width: 480px;
    }
    .quiz-header-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
    }
    .q-count { font-size: 1rem; color: #888; font-weight: 700; }
    .q-score { font-size: 1rem; color: #4ecdc4; font-weight: 700; }
    .quit-btn {
      background: none;
      border: none;
      font-size: 1.1rem;
      color: #bbb;
      cursor: pointer;
      padding: 4px 8px;
      font-family: inherit;
    }
    .progress-bar-wrap {
      background: #ffe;
      border-radius: 50px;
      height: 12px;
      overflow: hidden;
      box-shadow: inset 0 2px 4px rgba(0,0,0,.1);
    }
    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #ff6b35, #ffcc02);
      border-radius: 50px;
      transition: width .4s ease;
    }

    .stars-row {
      display: flex;
      gap: 4px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .star { font-size: 1.8rem; transition: transform .2s; }
    .star.lit { animation: starPop .3s ease; }
    @keyframes starPop { 0%,100%{transform:scale(1)} 50%{transform:scale(1.5)} }

    .problem-card {
      width: 100%;
      max-width: 480px;
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 4px 20px rgba(0,0,0,.1);
      padding: 24px 20px;
      text-align: center;
    }
    .problem-number { font-size: .9rem; color: #aaa; margin-bottom: 6px; }
    .problem-sentence {
      font-size: 1.5rem;
      font-weight: 700;
      color: #333;
      line-height: 1.9;
      margin-bottom: 14px;
    }
    .problem-target {
      display: inline-block;
      font-size: 2rem;
      font-weight: 900;
      color: #ff6b35;
      background: #fff5f0;
      border: 2px dashed #ff6b35;
      border-radius: 12px;
      padding: 6px 20px;
    }
    .problem-instruction {
      font-size: 1rem;
      color: #888;
      margin-top: 10px;
    }

    /* ===== キャンバス ===== */
    .canvas-wrap {
      width: 100%;
      max-width: 480px;
      overflow-x: auto;
      touch-action: none;
    }
    #draw-canvas {
      display: block;
      border-radius: 12px;
      background: #fafafa;
      border: 2px solid #ddd;
      touch-action: none;
      margin: 0 auto;
    }

    .canvas-actions {
      display: flex;
      flex-direction: column;
      gap: 10px;
      width: 100%;
      max-width: 480px;
    }
    .canvas-row1 { display: flex; gap: 10px; }
    .canvas-row1 .btn { flex: 1; padding: 16px 8px; font-size: 1.1rem; max-width: none; }
    .canvas-row2 .btn { width: 100%; max-width: none; padding: 14px; font-size: 1rem; }

    /* ===== 正誤オーバーレイ ===== */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 100;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 24px;
      padding: 20px;
    }
    .overlay.show { display: flex; }
    .overlay-correct { background: rgba(46, 160, 67, .93); }
    .overlay-wrong   { background: rgba(30, 30, 100, .95); }

    .feedback-icon { font-size: 8rem; animation: popIn .3s cubic-bezier(.34,1.56,.64,1); }
    @keyframes popIn { 0%{transform:scale(0)} 100%{transform:scale(1)} }
    .feedback-text { font-size: 2.2rem; font-weight: 900; color: #fff; text-align: center; }
    .feedback-answer {
      font-size: 1.4rem;
      color: #fff;
      text-align: center;
      background: rgba(255,255,255,.15);
      border-radius: 16px;
      padding: 16px 28px;
      line-height: 1.6;
    }
    .feedback-answer strong {
      display: block;
      font-size: 3rem;
      color: #ffd700;
      margin-top: 8px;
    }
    .feedback-next {
      background: #fff;
      border: none;
      border-radius: 50px;
      padding: 16px 48px;
      font-family: inherit;
      font-size: 1.2rem;
      font-weight: 700;
      cursor: pointer;
      color: #333;
    }

    /* ===== 紙吹雪 ===== */
    .confetti-container { position: fixed; inset: 0; pointer-events: none; z-index: 99; overflow: hidden; }
    .confetti-piece {
      position: absolute;
      border-radius: 2px;
      animation: confettiFall linear forwards;
    }
    @keyframes confettiFall {
      0%   { transform: translateY(-20px) rotate(0deg); opacity: 1; }
      100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
    }

    /* ===== ご褒美 ===== */
    #s-reward { justify-content: center; padding: 0; background: #111; }
    .reward-bg { position: fixed; inset: 0; background: #000; z-index: 0; }
    .reward-content {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      padding: 32px 16px;
      animation: rewardIn .5s cubic-bezier(.34,1.56,.64,1);
    }
    @keyframes rewardIn { 0%{transform:scale(0) rotate(-10deg);opacity:0} 100%{transform:scale(1) rotate(0);opacity:1} }
    .reward-title { font-size: 2.6rem; font-weight: 900; color: #ffd700; text-shadow: 0 0 20px #ff6b35; text-align: center; }
    .reward-img {
      max-width: min(90vw, 480px);
      max-height: 60vh;
      border-radius: 16px;
      box-shadow: 0 0 40px rgba(255,215,0,.4);
      object-fit: contain;
    }
    .reward-emoji { font-size: 8rem; text-align: center; animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.1)} }
    .reward-msg { font-size: 1.2rem; color: #fff; text-align: center; }

    /* ===== 結果 ===== */
    #s-result { justify-content: center; gap: 24px; }
    .result-score { font-size: 5rem; font-weight: 900; color: #ff6b35; text-align: center; line-height: 1; }
    .result-score span { font-size: 2rem; color: #888; }
    .result-msg { font-size: 1.3rem; color: #555; text-align: center; }
    .wrong-list { width: 100%; max-width: 480px; }
    .wrong-item { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid #eee; }
    .wrong-kanji  { font-size: 1.7rem; font-weight: 700; color: #ff4757; min-width: 72px; }
    .wrong-reading{ font-size: 1.1rem; color: #666; }

    /* ===== エラー ===== */
    .error-box {
      background: #fff0f0; border: 2px solid #ff4757; border-radius: 12px;
      padding: 16px; color: #c0392b; font-size: 1rem;
      width: 100%; max-width: 480px;
    }

    .inline-spinner {
      display: inline-block; width: 20px; height: 20px;
      border: 3px solid rgba(255,255,255,.4); border-top-color: #fff;
      border-radius: 50%; animation: spin .6s linear infinite;
      vertical-align: middle; margin-right: 8px;
    }
  </style>
</head>
<body>

<!-- ========== 画面1: スタート ========== -->
<div id="s-start" class="screen active">
  <span class="title-emoji">✏️</span>
  <h1>漢字クイズ！</h1>
  <p class="subtitle">漢字をかいて　練習しよう</p>

  <!-- 続きから再開（保存データがある場合に表示） -->
  <div id="resume-card" class="resume-card" style="display:none">
    <div class="resume-label">📌 前回のつづき</div>
    <div class="resume-info" id="resume-info"></div>
    <button class="btn btn-secondary" onclick="resumeQuiz()" style="max-width:none;margin:0 auto 8px">つづきから▶</button>
    <button style="background:none;border:none;color:#aaa;font-size:.9rem;cursor:pointer;font-family:inherit" onclick="clearSave()">最初からやり直す</button>
  </div>

  <button class="btn btn-primary" onclick="goSetup()">新しくはじめる！</button>
</div>

<!-- ========== 画面2: セットアップ ========== -->
<div id="s-setup" class="screen">
  <h2>⚙️ 設定</h2>

  <div class="card" style="max-width:480px;width:100%">
    <div class="section-label">🎁 ごほうびキャラクター</div>
    <div id="series-grid" class="series-grid">
      <p style="color:#aaa">よみこみ中...</p>
    </div>
  </div>

  <div class="card" style="max-width:480px;width:100%">
    <div class="section-label">📚 ドリルをえらぶ（いくつでもOK）</div>
    <div id="drill-grid" class="drill-grid">
      <p style="color:#aaa">よみこみ中...</p>
    </div>
  </div>

  <div id="setup-error" style="display:none" class="error-box"></div>

  <button class="btn btn-primary" id="start-btn" onclick="startQuiz()" disabled style="opacity:.5;max-width:320px">
    スタート！🚀
  </button>
  <button class="btn btn-ghost" onclick="showScreen('s-start')" style="max-width:320px">もどる</button>
</div>

<!-- ========== 画面3: ローディング ========== -->
<div id="s-loading" class="screen">
  <div class="spinner"></div>
  <p style="color:#888;font-size:1.1rem">問題を読みこんでいます…</p>
</div>

<!-- ========== 画面4: クイズ ========== -->
<div id="s-quiz" class="screen">
  <div class="quiz-header">
    <div class="quiz-header-top">
      <span class="q-count" id="q-count"></span>
      <span class="q-score" id="q-score"></span>
      <button class="quit-btn" onclick="confirmQuit()">⏸ やめる</button>
    </div>
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>
    </div>
  </div>

  <div class="stars-row" id="stars-row"></div>

  <div class="problem-card">
    <div class="problem-number" id="p-number"></div>
    <div class="problem-sentence" id="p-sentence"></div>
    <div class="problem-target" id="p-target"></div>
    <div class="problem-instruction">↑ 漢字で書いてみよう！</div>
  </div>

  <!-- 縦並びキャンバスコンテナ -->
  <div id="canvas-stack" style="width:100%;max-width:480px;display:flex;flex-direction:column;gap:12px;"></div>

  <div class="canvas-actions">
    <div class="canvas-row1">
      <button class="btn btn-ghost" onclick="clearDraw()">けす🗑️</button>
      <button class="btn btn-primary" id="check-btn" onclick="checkAnswer()">かくにんする✅</button>
    </div>
    <div class="canvas-row2">
      <button class="btn btn-answer" onclick="showAnswer()">答えを見る🔍</button>
    </div>
  </div>
</div>

<!-- ========== 正誤オーバーレイ ========== -->
<div id="overlay-correct" class="overlay overlay-correct">
  <div class="feedback-icon">⭕</div>
  <div class="feedback-text">せいかい！🎉</div>
  <button class="feedback-next" onclick="nextQuestion()">つぎへ ▶</button>
</div>

<div id="overlay-wrong" class="overlay overlay-wrong">
  <div class="feedback-icon">❌</div>
  <div class="feedback-text">ざんねん！</div>
  <div class="feedback-answer" id="wrong-answer-text"></div>
  <button class="feedback-next" onclick="nextQuestion()">つぎへ ▶</button>
</div>

<div id="overlay-answer" class="overlay" style="background:rgba(0,0,0,.88)">
  <div class="feedback-icon">👁️</div>
  <div class="feedback-text" style="color:#ffd700">こたえ</div>
  <div class="feedback-answer" id="show-answer-text"></div>
  <button class="feedback-next" onclick="skipAfterAnswer()">つぎへ ▶</button>
</div>

<div class="confetti-container" id="confetti-container"></div>

<!-- ========== 画面5: ご褒美 ========== -->
<div id="s-reward" class="screen">
  <div class="reward-bg"></div>
  <div class="reward-content">
    <div class="reward-title" id="reward-title">🎊 すごい！10もんクリア！ 🎊</div>
    <img id="reward-img" class="reward-img" src="" alt="" style="display:none"
         onload="this.style.display='block'"
         onerror="this.style.display='none'; document.getElementById('reward-emoji').style.display='block'">
    <div id="reward-emoji" class="reward-emoji" style="display:none">🎉</div>
    <div class="reward-msg" id="reward-msg"></div>
    <button class="btn btn-primary" onclick="continueAfterReward()" style="max-width:280px">
      つづける！💪
    </button>
  </div>
</div>

<!-- ========== 画面6: 結果 ========== -->
<div id="s-result" class="screen">
  <h1 style="font-size:2.2rem">けっか！📊</h1>

  <div class="card" style="max-width:480px;width:100%;text-align:center">
    <div class="result-score" id="result-score">0<span>てん</span></div>
    <div class="result-msg" id="result-msg" style="margin-top:10px"></div>
  </div>

  <div class="card wrong-list" id="wrong-list-card" style="max-width:480px;display:none">
    <div class="section-label">📝 もう一度れんしゅうしよう</div>
    <div id="wrong-list"></div>
  </div>

  <button class="btn btn-primary" onclick="goSetup()" style="max-width:320px">もう一度！🔁</button>
  <button class="btn btn-ghost"   onclick="showScreen('s-start')" style="max-width:320px">トップへ</button>
</div>

<script>
// ============================================================
//  設定
// ============================================================
const GAS_URL    = 'https://script.google.com/macros/s/AKfycby23IUfujJUfA37-nCd2TNfM9fmY4JnQxUPGKa1mcSXZP_P-LXGh123akBCjw6Lq5U1/exec';
const SAVE_KEY   = 'kanji_quiz_save';
const REWARD_EVERY = 10;

// ============================================================
//  状態
// ============================================================
const state = {
  seriesList    : [],
  selectedSeries: null,
  selectedDrills: new Set(),
  shuffled      : [],
  current       : 0,
  correct       : 0,
  answeredSince : 0,
  wrongItems    : [],
  rewardImages  : [],
};

// ============================================================
//  画面切替
// ============================================================
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}

// ============================================================
//  進捗の保存・読込（localStorage）
// ============================================================
function saveProgress() {
  const save = {
    shuffled      : state.shuffled,
    current       : state.current,
    correct       : state.correct,
    answeredSince : state.answeredSince,
    wrongItems    : state.wrongItems,
    selectedSeries: state.selectedSeries,
    rewardImages  : state.rewardImages,
    selectedDrills: [...state.selectedDrills],
    savedAt       : Date.now(),
  };
  localStorage.setItem(SAVE_KEY, JSON.stringify(save));
}

function loadSave() {
  try {
    const s = localStorage.getItem(SAVE_KEY);
    if (!s) return null;
    return JSON.parse(s);
  } catch { return null; }
}

function clearSave() {
  localStorage.removeItem(SAVE_KEY);
  document.getElementById('resume-card').style.display = 'none';
}

function checkResume() {
  const save = loadSave();
  if (!save || save.current >= save.shuffled.length) { clearSave(); return; }
  const left = save.shuffled.length - save.current;
  document.getElementById('resume-info').textContent =
    `ドリル ${[...new Set(save.shuffled.map(p=>p.drillNum))].join('・')}｜のこり ${left} もん`;
  document.getElementById('resume-card').style.display = 'block';
}

function resumeQuiz() {
  const save = loadSave();
  if (!save) return;
  state.shuffled       = save.shuffled;
  state.current        = save.current;
  state.correct        = save.correct;
  state.answeredSince  = save.answeredSince;
  state.wrongItems     = save.wrongItems;
  state.selectedSeries = save.selectedSeries;
  state.rewardImages   = save.rewardImages;
  state.selectedDrills = new Set(save.selectedDrills);
  buildStars();
  showScreen('s-quiz');
  renderQuestion();
}

// ============================================================
//  途中でやめる
// ============================================================
function confirmQuit() {
  if (confirm('やめますか？\nつづきは次回「つづきから」で再開できます。')) {
    saveProgress();
    showScreen('s-start');
    checkResume();
  }
}

// ============================================================
//  GAS API
// ============================================================
async function api(params) {
  const url = GAS_URL + '?' + new URLSearchParams(params).toString();
  const res = await fetch(url);
  return res.json();
}

// ============================================================
//  セットアップ画面
// ============================================================
async function goSetup() {
  showScreen('s-setup');
  document.getElementById('setup-error').style.display = 'none';
  try {
    const [sData, dData] = await Promise.all([
      api({ action: 'getRewardSeries' }),
      api({ action: 'getDrillList' }),
    ]);
    renderSeriesGrid(sData.series || []);
    renderDrillGrid(dData.drills || []);
  } catch (e) {
    showSetupError('接続に失敗しました。\n' + e.message);
  }
}

function renderSeriesGrid(series) {
  state.seriesList = series;
  const grid = document.getElementById('series-grid');
  if (!series.length) { grid.innerHTML = '<p style="color:#aaa">シリーズがありません</p>'; return; }
  grid.innerHTML = '';
  series.forEach((s, i) => {
    const btn = document.createElement('button');
    btn.className = 'series-btn';
    btn.innerHTML = `<span class="series-emoji">${s.emoji}</span>${s.name}`;
    btn.onclick = () => {
      document.querySelectorAll('.series-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      state.selectedSeries = s;
      updateStartBtn();
    };
    grid.appendChild(btn);
    if (i === 0) btn.click();
  });
}

function renderDrillGrid(drills) {
  const grid = document.getElementById('drill-grid');
  if (!drills.length) { grid.innerHTML = '<p style="color:#aaa">ドリルがありません</p>'; return; }
  grid.innerHTML = '';
  drills.forEach(d => {
    const btn = document.createElement('button');
    btn.className = 'drill-btn';
    btn.textContent = d;
    btn.onclick = () => {
      btn.classList.toggle('selected');
      if (state.selectedDrills.has(d)) state.selectedDrills.delete(d);
      else state.selectedDrills.add(d);
      updateStartBtn();
    };
    grid.appendChild(btn);
  });
}

function updateStartBtn() {
  const ok  = state.selectedSeries && state.selectedDrills.size > 0;
  const btn = document.getElementById('start-btn');
  btn.disabled      = !ok;
  btn.style.opacity = ok ? '1' : '.5';
}

function showSetupError(msg) {
  const el = document.getElementById('setup-error');
  el.textContent     = msg;
  el.style.display   = 'block';
}

// ============================================================
//  クイズ開始
// ============================================================
async function startQuiz() {
  showScreen('s-loading');
  try {
    const [pData, rData] = await Promise.all([
      api({ action: 'getProblems', drills: [...state.selectedDrills].join(',') }),
      api({ action: 'getRewardImages', folderId: state.selectedSeries.folderId }),
    ]);
    if (!pData.problems || pData.problems.length === 0) {
      showSetupError('選択したドリルに問題がありません。');
      showScreen('s-setup');
      return;
    }
    state.shuffled      = shuffle([...pData.problems]);
    state.rewardImages  = rData.images || [];
    state.current       = 0;
    state.correct       = 0;
    state.answeredSince = 0;
    state.wrongItems    = [];
    clearSave();
    buildStars();
    showScreen('s-quiz');
    renderQuestion();
  } catch (e) {
    showSetupError('読み込みに失敗しました。\n' + e.message);
    showScreen('s-setup');
  }
}

// ============================================================
//  問題表示
// ============================================================
function renderQuestion() {
  const total = state.shuffled.length;
  const idx   = state.current;
  if (idx >= total) { showResult(); return; }

  const p = state.shuffled[idx];

  document.getElementById('q-count').textContent  = `${idx + 1} / ${total}`;
  document.getElementById('q-score').textContent  = `⭐ ${state.correct} せいかい`;
  document.getElementById('progress-fill').style.width = ((idx / total) * 100) + '%';
  updateStars();

  document.getElementById('p-number').textContent = `ドリル ${p.drillNum} ⬩ もんだい ${p.questionNum}`;
  const sentence = p.sentence.replace(
    p.target,
    `<span style="color:#ff6b35;font-weight:900">${p.target}</span>`
  );
  document.getElementById('p-sentence').innerHTML = sentence;
  document.getElementById('p-target').textContent = `「 ${p.target} 」`;

  initCanvas(p.answer.length);
}

// ============================================================
//  スター
// ============================================================
function buildStars() {
  const row = document.getElementById('stars-row');
  row.innerHTML = '';
  for (let i = 0; i < REWARD_EVERY; i++) {
    const s = document.createElement('span');
    s.className   = 'star';
    s.textContent = '☆';
    s.id          = 'star-' + i;
    row.appendChild(s);
  }
}

function updateStars() {
  for (let i = 0; i < REWARD_EVERY; i++) {
    const el = document.getElementById('star-' + i);
    if (!el) return;
    const lit = i < state.answeredSince;
    el.textContent = lit ? '⭐' : '☆';
    if (lit) el.classList.add('lit');
    else el.classList.remove('lit');
  }
}

// ============================================================
//  キャンバス
// ============================================================
// 複数キャンバス管理
// canvases = [{ canvas, ctx, strokes, drawing, currentStroke }, ...]
let canvases = [];

function initCanvas(charCount) {
  const stack = document.getElementById('canvas-stack');
  stack.innerHTML = '';
  canvases = [];

  const size = Math.min(window.innerWidth - 48, 280);

  for (let i = 0; i < charCount; i++) {
    // ラベル
    const label = document.createElement('div');
    label.style.cssText = 'font-size:.95rem;font-weight:700;color:#888;text-align:center;margin-bottom:2px';
    label.textContent = charCount > 1 ? `${i + 1}文字目` : '';

    // キャンバス
    const cvs = document.createElement('canvas');
    cvs.width        = size;
    cvs.height       = size;
    cvs.style.cssText= `display:block;margin:0 auto;border-radius:12px;background:#fafafa;border:2px solid #ddd;touch-action:none;`;

    const wrap = document.createElement('div');
    wrap.style.cssText = 'width:100%';
    if (charCount > 1) wrap.appendChild(label);
    wrap.appendChild(cvs);
    stack.appendChild(wrap);

    const ctx = cvs.getContext('2d');
    const entry = { canvas: cvs, ctx, strokes: [], drawing: false, currentStroke: null };
    canvases.push(entry);

    drawCell(ctx, size);
    setupCanvasEventsFor(cvs, entry);
  }
}

function drawCell(ctx, size) {
  ctx.clearRect(0, 0, size, size);
  ctx.strokeStyle = '#ccc';
  ctx.lineWidth   = 1;
  ctx.strokeRect(1, 1, size - 2, size - 2);
  ctx.setLineDash([6, 6]);
  ctx.beginPath();
  ctx.moveTo(size / 2, 2); ctx.lineTo(size / 2, size - 2);
  ctx.moveTo(2, size / 2); ctx.lineTo(size - 2, size / 2);
  ctx.stroke();
  ctx.setLineDash([]);
}

function setupCanvasEventsFor(cvs, entry) {
  cvs.addEventListener('pointerdown', e => {
    e.preventDefault();
    entry.drawing       = true;
    const p             = getPosOn(e, cvs);
    entry.currentStroke = { x: [p.x], y: [p.y], t: [Date.now()] };
    entry.ctx.lineWidth   = 5;
    entry.ctx.strokeStyle = '#111';
    entry.ctx.lineCap     = 'round';
    entry.ctx.lineJoin    = 'round';
    entry.ctx.beginPath();
    entry.ctx.moveTo(p.x, p.y);
    cvs.setPointerCapture(e.pointerId);
  }, { passive: false });

  cvs.addEventListener('pointermove', e => {
    if (!entry.drawing) return;
    e.preventDefault();
    const p = getPosOn(e, cvs);
    entry.currentStroke.x.push(p.x);
    entry.currentStroke.y.push(p.y);
    entry.currentStroke.t.push(Date.now());
    entry.ctx.lineTo(p.x, p.y);
    entry.ctx.stroke();
    entry.ctx.beginPath();
    entry.ctx.moveTo(p.x, p.y);
  }, { passive: false });

  const endDraw = () => {
    if (!entry.drawing) return;
    entry.drawing = false;
    if (entry.currentStroke && entry.currentStroke.x.length > 1) {
      entry.strokes.push(sampleStroke(entry.currentStroke, 15));
    }
    entry.currentStroke = null;
  };
  cvs.addEventListener('pointerup',     endDraw);
  cvs.addEventListener('pointercancel', endDraw);
}

function getPosOn(e, cvs) {
  const rect = cvs.getBoundingClientRect();
  const sx = cvs.width  / rect.width;
  const sy = cvs.height / rect.height;
  return { x: (e.clientX - rect.left) * sx, y: (e.clientY - rect.top) * sy };
}

// イベント登録は setupCanvasEventsFor で各キャンバスごとに行うため不要

function sampleStroke(stroke, maxPts) {
  if (stroke.x.length <= maxPts) return stroke;
  const step = (stroke.x.length - 1) / (maxPts - 1);
  const x = [], y = [], t = [];
  for (let i = 0; i < maxPts; i++) {
    const idx = Math.round(i * step);
    x.push(Math.round(stroke.x[idx]));
    y.push(Math.round(stroke.y[idx]));
    t.push(stroke.t[idx] - stroke.t[0]);
  }
  return { x, y, t };
}

function clearDraw() {
  canvases.forEach(entry => {
    entry.strokes       = [];
    entry.drawing       = false;
    entry.currentStroke = null;
    drawCell(entry.ctx, entry.canvas.width);
  });
}

// ============================================================
//  答えを見る
// ============================================================
function showAnswer() {
  const p = state.shuffled[state.current];
  document.getElementById('show-answer-text').innerHTML =
    `「 ${p.target} 」は<strong>${p.answer}</strong>`;
  document.getElementById('overlay-answer').classList.add('show');
}

function skipAfterAnswer() {
  document.getElementById('overlay-answer').classList.remove('show');
  const p = state.shuffled[state.current];
  state.wrongItems.push({ target: p.target, answer: p.answer });
  state.answeredSince++;
  updateStars();
  checkRewardOrNext();
}

// ============================================================
//  答え合わせ（1文字ずつ対応）
// ============================================================
async function checkAnswer() {
  // 1つもストロークがないキャンバスがあったら警告
  const hasAllDrawn = canvases.every(e => e.strokes.length > 0);
  if (!hasAllDrawn) {
    alert('全部の文字を書いてください！');
    return;
  }

  const btn = document.getElementById('check-btn');
  btn.disabled  = true;
  btn.innerHTML = '<span class="inline-spinner"></span>はんていちゅう…';

  try {
    const p = state.shuffled[state.current];

    // 各キャンバスを並行して認識
    const results = await Promise.all(
      canvases.map((entry, i) => {
        const ink = entry.strokes.map(s => [s.x, s.y, s.t]);
        return recognizeHandwriting(ink, entry.canvas.width, entry.canvas.height)
          .then(candidates => {
            const targetChar = p.answer[i];
            const correct    = candidates.some(c => normalize(c).includes(kanji(targetChar)) || normalize(c) === normalize(targetChar));
            return correct;
          });
      })
    );

    const allCorrect = results.every(r => r);

    btn.disabled  = false;
    btn.innerHTML = 'かくにんする✅';
    showFeedback(allCorrect, p.answer);
  } catch (e) {
    btn.disabled  = false;
    btn.innerHTML = 'かくにんする✅';
    alert('エラーが発生しました。\n' + e.message);
  }
}

async function recognizeHandwriting(ink, width, height) {
  const url  = 'https://inputtools.google.com/request?itc=ja-t-i0-handwrit&num=5';
  const body = JSON.stringify({
    requests: [{ writing_guide: { writing_area_width: width, writing_area_height: height }, ink, language: 'ja' }]
  });
  const res  = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body });
  const data = await res.json();
  if (data[0] === 'SUCCESS' && data[1]?.[0]?.[1]) return data[1][0][1];
  return [];
}

function judgeAnswer(answer, candidates) {
  const normA = normalize(answer);
  const kanjiA = kanji(answer);
  return candidates.some(c => {
    const nc = normalize(c);
    if (nc === normA) return true;
    if (kanjiA && kanji(c) === kanjiA) return true;
    if (kanjiA && nc.includes(kanjiA)) return true;
    return false;
  });
}

function normalize(s) { return s.replace(/[　\s。、・「」『』（）()]/g, ''); }
function kanji(s)     { return s.replace(/[^\u4e00-\u9fff]/g, ''); }

// ============================================================
//  フィードバック
// ============================================================
function showFeedback(correct, answer) {
  const p = state.shuffled[state.current];
  state.answeredSince++;

  if (correct) {
    state.correct++;
    showConfetti();
    document.getElementById('overlay-correct').classList.add('show');
  } else {
    state.wrongItems.push({ target: p.target, answer });
    document.getElementById('wrong-answer-text').innerHTML =
      `「 ${p.target} 」は<strong>${answer}</strong>`;
    document.getElementById('overlay-wrong').classList.add('show');
  }
}

function nextQuestion() {
  document.getElementById('overlay-correct').classList.remove('show');
  document.getElementById('overlay-wrong').classList.remove('show');
  document.getElementById('confetti-container').innerHTML = '';
  checkRewardOrNext();
}

function checkRewardOrNext() {
  if (state.answeredSince >= REWARD_EVERY) {
    state.answeredSince = 0;
    state.current++;
    saveProgress();
    showReward();
  } else {
    state.current++;
    saveProgress();
    renderQuestion();
  }
}

// ============================================================
//  紙吹雪
// ============================================================
const CONFETTI_COLORS = ['#ff6b35','#ffd700','#4ecdc4','#ff6b8a','#a29bfe','#55efc4'];
function showConfetti() {
  const c = document.getElementById('confetti-container');
  c.innerHTML = '';
  for (let i = 0; i < 60; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    el.style.cssText = `
      left:${Math.random()*100}%;
      background:${CONFETTI_COLORS[Math.floor(Math.random()*CONFETTI_COLORS.length)]};
      animation-duration:${.8+Math.random()*.8}s;
      animation-delay:${Math.random()*.3}s;
      width:${6+Math.random()*8}px; height:${6+Math.random()*8}px;
      border-radius:${Math.random()>.5?'50%':'2px'};
    `;
    c.appendChild(el);
  }
}

// ============================================================
//  ご褒美画面
// ============================================================
function showReward() {
  const images = state.rewardImages;
  const total  = state.shuffled.length;
  const left   = total - state.current;

  document.getElementById('reward-title').textContent = `🎊 すごい！${REWARD_EVERY}もんクリア！ 🎊`;
  document.getElementById('reward-msg').textContent   =
    left > 0 ? `のこり ${left} もん！がんばろう！` : 'ぜんぶおわった！すごい！🏆';

  const imgEl   = document.getElementById('reward-img');
  const emojiEl = document.getElementById('reward-emoji');
  imgEl.style.display   = 'none';
  emojiEl.style.display = 'none';

  if (images.length > 0) {
    const item  = images[Math.floor(Math.random() * images.length)];
    // drive.google.com/uc?id=XXX → lh3.googleusercontent.com/d/XXX（表示が安定）
    let url = item.url;
    const m = url.match(/[?&]id=([^&]+)/);
    if (m) url = `https://lh3.googleusercontent.com/d/${m[1]}`;
    imgEl.src = url;
    // onload/onerror で表示切替（HTMLに設定済み）
  } else {
    emojiEl.style.display = 'block';
    emojiEl.textContent   = state.selectedSeries?.emoji || '🎉';
  }

  showScreen('s-reward');
}

function continueAfterReward() {
  buildStars();
  if (state.current >= state.shuffled.length) showResult();
  else { showScreen('s-quiz'); renderQuestion(); }
}

// ============================================================
//  結果画面
// ============================================================
function showResult() {
  clearSave();
  const total  = state.shuffled.length;
  const pct    = Math.round((state.correct / total) * 100);
  document.getElementById('result-score').innerHTML =
    `${state.correct}<span> / ${total}もん</span>`;

  let msg = '';
  if (pct === 100)     msg = '🏆 パーフェクト！すばらしい！';
  else if (pct >= 80)  msg = '🌟 よくできました！';
  else if (pct >= 60)  msg = '👍 もうすこし！がんばろう！';
  else                 msg = '💪 もう一度れんしゅうしよう！';
  document.getElementById('result-msg').textContent = msg;

  const wrongCard = document.getElementById('wrong-list-card');
  const wrongList = document.getElementById('wrong-list');
  if (state.wrongItems.length > 0) {
    wrongList.innerHTML = '';
    const seen = new Set();
    state.wrongItems.filter(w => {
      if (seen.has(w.answer)) return false;
      seen.add(w.answer);
      return true;
    }).forEach(w => {
      const div = document.createElement('div');
      div.className = 'wrong-item';
      div.innerHTML = `<span class="wrong-kanji">${w.answer}</span><span class="wrong-reading">${w.target}</span>`;
      wrongList.appendChild(div);
    });
    wrongCard.style.display = 'block';
  } else {
    wrongCard.style.display = 'none';
  }
  showScreen('s-result');
}

// ============================================================
//  ユーティリティ
// ============================================================
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// ============================================================
//  起動
// ============================================================
window.addEventListener('DOMContentLoaded', () => {
  checkResume();
});
</script>
